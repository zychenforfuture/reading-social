name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://admin:testpassword@localhost:5432/collab_comments_test
  REDIS_URL: redis://localhost:6379
  QDRANT_URL: http://localhost:6333
  JWT_SECRET: test-jwt-secret-for-ci-testing-only-min-32-chars
  FRONTEND_URL: http://localhost:5173
  SMTP_HOST: smtp.example.com
  SMTP_USER: test@example.com
  SMTP_PASS: testpassword

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: collab_comments_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm -r lint
        continue-on-error: true

      - name: Run tests
        run: pnpm --filter @collab/api test

      - name: Build packages
        run: pnpm -r build
