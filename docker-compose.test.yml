version: '3.8'

services:
  # PostgreSQL 测试数据库
  postgres-test:
    image: postgres:16-alpine
    container_name: collab-postgres-test
    environment:
      POSTGRES_DB: collab_comments_test
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d collab_comments_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test-network

  # Redis 测试缓存
  redis-test:
    image: redis:7-alpine
    container_name: collab-redis-test
    command: redis-server
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test-network

  # Qdrant 测试向量数据库（可选）
  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: collab-qdrant-test
    ports:
      - "6334:6333"
    volumes:
      - ./volumes/qdrant-test:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
