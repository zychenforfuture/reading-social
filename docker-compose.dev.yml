# 开发环境 Docker Compose
# 用于快速启动基础设施，开发调试使用
version: '3.8'

services:
  # PostgreSQL - 元数据数据库
  postgres:
    image: postgres:16-alpine
    container_name: collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collab_comments
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CollabDev2026!}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d collab_comments"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: collab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CollabDev2026!}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-CollabDev2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: collab-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local
