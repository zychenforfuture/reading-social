version: '3.8'

services:
  # PostgreSQL - 元数据数据库
  postgres:
    image: postgres:16-alpine
    container_name: collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collab_comments
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CollabDev2026!}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d collab_comments"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: collab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CollabDev2026!}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-CollabDev2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: collab-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API 服务
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: collab-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-CollabDev2026!}@postgres:5432/collab_comments
      REDIS_URL: redis://:${REDIS_PASSWORD:-CollabDev2026!}@redis:6379
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET:-CollabJWTSecret2026!}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./packages/api:/app
      - /app/node_modules

  # Worker 服务
  worker:
    build:
      context: ./packages/worker
      dockerfile: Dockerfile
    container_name: collab-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-CollabDev2026!}@postgres:5432/collab_comments
      REDIS_URL: redis://:${REDIS_PASSWORD:-CollabDev2026!}@redis:6379
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./packages/worker:/app
      - /app/node_modules

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local

networks:
  default:
    name: collab-network
